sercice:
  product-service:
    build: ./product_service 
    ports:
      - "8001:8000"
    network:
      - service-net

  order-service:
    build: ./order_service
    ports:
      - "8002:8000"
    environment:
      PRODUCT_SERVICE_URL: http://product-service:8000
    depends_on:
      - product-service
    network:
      - service-net

network:
  service-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.10.0/24

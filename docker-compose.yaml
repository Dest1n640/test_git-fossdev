services:
  product-service:
    build: ./product_service 
    ports:
      - "8001:8000"
    networks:
      - service-net

  order-service:
    build: ./order_service
    ports:
      - "8002:8000"
    environment:
      PRODUCT_SERVICE_URL: http://product-service:8000
    depends_on:
      - product-service
    networks:
      - service-net
    volumes:
      - order-db-data:/var/lib/postgresql/data

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app 
      POSTGRES_DB: orders
    ports: 
      - "5432:5432"
    networks:
      - service-net
    volumes:
      - order-db-data:/var/lib/postgresql/data

networks:
  service-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.10.0/24

volumes:
  order-db-data:
